name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Lint + Type Check
  # ──────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type Check
        run: bunx tsc --noEmit

  # ──────────────────────────────────────────────
  # Stage 2: Production Build
  # ──────────────────────────────────────────────
  build:
    name: Build
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-

      - name: Build Next.js
        run: bun run build

      - name: Verify build output
        run: |
          if [ ! -f ".next/BUILD_ID" ]; then
            echo "::error::Next.js build output (BUILD_ID) not found. Build may have failed silently."
            exit 1
          fi
          ls -R .next | head -n 20

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next
          retention-days: 1

  # ──────────────────────────────────────────────
  # Stage 3: E2E Tests (Playwright)
  # ──────────────────────────────────────────────
  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_PH_EMAIL: ${{ secrets.E2E_PH_EMAIL }}
      E2E_PH_PASSWORD: ${{ secrets.E2E_PH_PASSWORD }}
      E2E_SENDER_EMAIL: ${{ secrets.E2E_SENDER_EMAIL }}
      E2E_SENDER_PASSWORD: ${{ secrets.E2E_SENDER_PASSWORD }}
      E2E_HR_EMAIL: ${{ secrets.E2E_HR_EMAIL }}
      E2E_HR_PASSWORD: ${{ secrets.E2E_HR_PASSWORD }}
      E2E_REPORT_ID: ${{ secrets.E2E_REPORT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: bunx playwright test --project=chromium

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Stage 4: Dependency Audit
  # ──────────────────────────────────────────────
  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run dependency check
        run: bun pm ls --all 2>&1 | head -50
        continue-on-error: true
